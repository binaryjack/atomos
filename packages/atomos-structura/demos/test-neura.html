<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Structura Neura Demo</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
    #neura-container { width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    .overlay { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none; }
  </style>
</head>
<body>
  <div id="neura-container">
    <canvas id="neura-canvas"></canvas>
    <div class="overlay">
      <h2>Structura Neura</h2>
      <p>Pan (Drag) and Zoom (Scroll) to test high-density WebGL rendering.</p>
    </div>
  </div>

  <script type="module">
    // In a real dev environment, Vite handles this import.
    // For the demo to work post-build, it would point to dist.
    import { createNeuraInstance } from '../src/neura/create-neura-instance.ts';

    const canvas = document.getElementById('neura-canvas');
    const workerUrl = new URL('../src/neura/physics/worker.ts', window.location.href);
    
    const neura = createNeuraInstance(canvas, workerUrl);

    // Generate 10,000 nodes for high density test
    console.log("Generating 10,000 mock nodes...");
    neura.generateMockData(10000);
    console.log("Mock data loaded.");
  </script>
</body>
</html>
